<!DOCTYPE html>
<html lang="hr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Capsula</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- STRELICA (skrivena na početku) -->
    <button id="backBtn" class="back hidden" onclick="goHome()">⬅ Natrag</button>

    <!-- NASLOV -->
    <header class="hero">
        <h1>TIME CAPSULA</h1>
        <p>Odaberi što želiš otvoriti</p>
    </header>

    <!-- POČETNA STRANICA (MENU) -->
    <section class="menu">

        <div class="card" onclick="showSection('slike')">
            <h2>📸 Slike</h2>
        </div>

        <div class="card" onclick="showSection('intervjui')">
            <h2>🎤 Intervjui</h2>
        </div>

        <div class="card" onclick="showSection('glazba')">
            <h2>🎵 Glazba</h2>
        </div>

    </section>

    <!-- SLIKE -->
    <section id="slike" class="hidden page">

        <h2>Slike</h2>

        <div class="content">
            <img src="slike/slika1.jpg" onclick="openLightbox(this.src)">
            <img src="slike/slika2.jpg" onclick="openLightbox(this.src)">
            <img src="slike/slika3.jpg" onclick="openLightbox(this.src)">
            <img src="slike/slika4.jpg" onclick="openLightbox(this.src)">
            <img src="slike/slika5.jpg" onclick="openLightbox(this.src)">
            <img src="slike/slika6.jpg" onclick="openLightbox(this.src)">
            <img src="slike/slika7.jpg" onclick="openLightbox(this.src)">
            <img src="slike/slika8.jpg" onclick="openLightbox(this.src)">
            <img src="slike/slika9.jpg" onclick="openLightbox(this.src)">
        </div>

    </section>

    <!-- INTERVJUI -->
    <section id="intervjui" class="hidden page">

        <h2>Intervjui</h2>

        <div class="box">"Najbolje uspomene iz škole."</div>
        <div class="box">"Prijatelji zauvijek."</div>
        <div class="box">"Smijeh na svakom satu."</div>

    </section>

    <!-- GLAZBA -->
    <section id="glazba" class="hidden page">

        <h2>Glazba</h2>

        <ul>
            <li>🎵 Vojko V & Grše - Šibenik</li>
            <li>🎵 Danijel Veršić - Lovran, gradić mali</li>
            <li>🎵 Desingerica - Djeuskavac</li>
        </ul>

    </section>

    <!-- LIGHTBOX (MORA BITI PRIJE JS-a) -->
    <div id="lightbox" class="lightbox hidden" onclick="closeLightbox()">
        <img id="lightbox-img">
    </div>

    <!-- JAVASCRIPT -->
    <script src="script.js"></script>

</body>

</html>
